name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'tests/**'
      - 'package.json'
      - 'vite.config.ts'
      - '.github/workflows/build-android.yml'

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Android targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi x86_64-linux-android i686-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager --install "ndk;27.2.12479018"

      - name: Set NDK_HOME
        run: echo "NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: Install npm dependencies
        run: npm ci

      - name: Initialize Tauri Android
        run: npx tauri android init

      - name: Copy app icons to Android project
        run: |
          cp -r src-tauri/icons/android/mipmap-* src-tauri/gen/android/app/src/main/res/
          cp -r src-tauri/icons/android/values src-tauri/gen/android/app/src/main/res/

      - name: Patch Android project (manifest + minSdk)
        run: bash src-tauri/android-patches/patch-manifest.sh

      - name: Decode signing keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > src-tauri/gen/android/app/scratchpad.keystore

      - name: Build Android APK (release)
        run: npx tauri android build
        env:
          VITE_STORAGE_BACKEND: automerge
          VITE_SYNC_SERVER_URL: wss://sync.stormlab.app

      - name: Sign APK
        run: |
          APK=$(find src-tauri/gen/android/app/build/outputs/apk -name "*.apk" | head -1)
          ALIGNED="${APK%.apk}-aligned.apk"
          SIGNED="src-tauri/gen/android/app/build/outputs/apk/ScratchPad-v$(node -p 'require("./package.json").version').apk"
          ${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | tail -1)/zipalign -v 4 "$APK" "$ALIGNED"
          ${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | tail -1)/apksigner sign \
            --ks src-tauri/gen/android/app/scratchpad.keystore \
            --ks-key-alias ${{ secrets.KEY_ALIAS }} \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --key-pass pass:${{ secrets.KEY_PASSWORD }} \
            --out "$SIGNED" "$ALIGNED"
          echo "SIGNED_APK=$SIGNED" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: scratchpad-android
          path: ${{ env.SIGNED_APK }}
          retention-days: 30

      - name: Get version
        id: version
        run: echo "version=$(node -p 'require("./package.json").version')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: ScratchPad v${{ steps.version.outputs.version }}
          files: ${{ env.SIGNED_APK }}
          make_latest: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
