name: Build macOS DMG

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'tests/**'
      - 'package.json'
      - 'vite.config.ts'
      - '.github/workflows/build-macos.yml'

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64
          - target: x86_64-apple-darwin
            arch: x64

    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        run: npx tauri build --target ${{ matrix.target }}
        env:
          VITE_STORAGE_BACKEND: verdant
          VITE_SYNC_SERVER_URL: wss://sync.stormlab.app

      - name: Find and rename DMG
        run: |
          DMG=$(find src-tauri/target/${{ matrix.target }}/release/bundle/dmg -name "*.dmg" | head -1)
          DEST="src-tauri/target/ScratchPad-v$(node -p 'require("./package.json").version')-macos-${{ matrix.arch }}.dmg"
          cp "$DMG" "$DEST"
          echo "DMG_PATH=$DEST" >> $GITHUB_ENV

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: scratchpad-macos-${{ matrix.arch }}
          path: ${{ env.DMG_PATH }}
          retention-days: 30

      - name: Get version
        id: version
        run: echo "version=$(node -p 'require("./package.json").version')" >> $GITHUB_OUTPUT

      - name: Add DMG to GitHub Release
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: ScratchPad v${{ steps.version.outputs.version }}
          files: ${{ env.DMG_PATH }}
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}